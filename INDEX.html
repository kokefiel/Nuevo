<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Crypto</title>
<style>
:root{
--bg:#08080d;--bg2:#10111a;--bg3:#181a27;--bg4:#1f2235;
--card:#13142180;--card2:#1a1c2d;--card3:#22243a;
--tx:#e8eaf0;--tx2:#a0a4b8;--tx3:#6b6f85;
--acc:#4f8cff;--acc2:#3a6fd8;--w1:#378ADD;--w2:#BA7517;
--grn:#22c55e;--grn2:#16a34a;--red:#ef4444;--red2:#dc2626;
--ylw:#eab308;--ylw2:#ca8a04;
--brd:#ffffff0d;--brd2:#ffffff15;
--r:14px;--r2:10px;--r3:8px;
--shadow:0 4px 24px #0004,0 1px 4px #0002;
--glow:0 0 40px #4f8cff15;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;line-height:1.5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:9px}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .2s}
input,select{font-family:inherit;outline:none;border:1px solid var(--brd2);background:var(--bg2);color:var(--tx);padding:10px 14px;border-radius:var(--r3);font-size:.92rem;transition:border .2s}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--bg2)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 20px;display:flex;align-items:center;height:60px;gap:6px;backdrop-filter:blur(20px)}
.nav-btn{padding:8px 18px;border-radius:var(--r3);background:transparent;color:var(--tx2);font-size:.88rem;font-weight:500;letter-spacing:.02em}
.nav-btn:hover{background:var(--bg4);color:var(--tx)}
.nav-btn.active{background:var(--acc);color:#fff}
.nav-sep{width:1px;height:24px;background:var(--brd2);margin:0 4px}
.nav-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.nav-icon{width:38px;height:38px;border-radius:var(--r3);background:transparent;color:var(--tx2);font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.nav-icon:hover{background:var(--bg4);color:var(--tx)}
.btn-add{padding:8px 18px;border-radius:var(--r3);background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:.88rem;font-weight:600;letter-spacing:.02em}
.btn-add:hover{filter:brightness(1.15);transform:translateY(-1px)}
#syncInfo{font-size:.72rem;color:var(--tx3);white-space:nowrap;max-width:120px;text-align:right;line-height:1.2}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px;backdrop-filter:blur(12px);box-shadow:var(--shadow)}
.card-header{font-size:.82rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}

/* METRIC CARDS */
.metrics{display:grid;gap:14px;margin-bottom:24px}
.metrics.m3{grid-template-columns:repeat(3,1fr)}
.metrics.m4{grid-template-columns:repeat(4,1fr)}
.metric{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px 20px;backdrop-filter:blur(12px)}
.metric .label{font-size:.78rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.metric .val{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.metric .val.sm{font-size:1.15rem}
.metric .sub{font-size:.8rem;color:var(--tx3);margin-top:3px}
.metric.big .val{font-size:2rem}
.metric.hero{background:linear-gradient(135deg,#4f8cff12,#4f8cff05);border-color:#4f8cff30}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--bg3);border-radius:var(--r3);padding:3px;width:fit-content}
.tab{padding:8px 20px;border-radius:6px;background:transparent;color:var(--tx2);font-size:.85rem;font-weight:500}
.tab:hover{color:var(--tx)}
.tab.active{background:var(--bg);color:var(--tx);box-shadow:0 2px 8px #0003}

/* WALLET SELECTOR */
.wallet-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.wallet-card{padding:16px;border-radius:var(--r2);border:2px solid var(--brd);background:var(--card);cursor:pointer;transition:all .2s}
.wallet-card:hover{border-color:var(--tx3)}
.wallet-card.sel{border-color:var(--w1);background:#378ADD10}
.wallet-card.sel.w2{border-color:var(--w2);background:#BA751710}
.wallet-card .wname{font-weight:600;font-size:.95rem;margin-bottom:2px}
.wallet-card .wtype{font-size:.78rem;color:var(--tx3)}
.wallet-card .wval{font-size:1.2rem;font-weight:700;margin-top:6px}

/* PANELS ROW */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.panel{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px}
.panel h3{font-size:.82rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;font-weight:600}

/* DONUT */
.donut-wrap{position:relative;width:200px;height:200px;margin:0 auto}
.donut-wrap canvas{width:200px;height:200px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center .dval{font-size:1.2rem;font-weight:700}
.donut-center .dlbl{font-size:.72rem;color:var(--tx3)}
.legend{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--tx2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* BAR chart */
.bar-row{margin-bottom:14px}
.bar-label{font-size:.82rem;color:var(--tx2);margin-bottom:4px;display:flex;justify-content:space-between}
.bar-track{height:22px;background:var(--bg3);border-radius:6px;overflow:hidden;display:flex}
.bar-fill{height:100%;transition:width .4s;border-radius:6px}
.bar-sub{font-size:.73rem;color:var(--tx3);margin-top:2px;display:flex;gap:12px}
.hodl-defi-summary{display:flex;gap:20px;margin-bottom:16px;font-size:.85rem}
.hodl-defi-summary span{display:flex;align-items:center;gap:6px}
.hodl-defi-summary .dot{width:10px;height:10px;border-radius:3px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.76rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;padding:10px 12px;border-bottom:1px solid var(--brd)}
td{padding:12px;border-bottom:1px solid var(--brd);font-size:.88rem;vertical-align:middle}
tr:hover{background:var(--bg4)20}
.asset-cell{display:flex;align-items:center;gap:10px}
.asset-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.asset-sym{font-weight:600}
.asset-name{font-size:.78rem;color:var(--tx3)}
.price-sub{font-size:.76rem;color:var(--tx3)}
.pnl-pos{color:var(--grn)}
.pnl-neg{color:var(--red)}
.actions{display:flex;gap:4px}
.act-btn{width:32px;height:32px;border-radius:6px;background:var(--bg3);color:var(--tx2);font-size:.85rem;display:flex;align-items:center;justify-content:center}
.act-btn:hover{background:var(--bg4);color:var(--tx)}
.act-btn.del:hover{background:#ef444420;color:var(--red)}

/* POOL CARDS */
.pool-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.pill{padding:7px 16px;border-radius:20px;background:var(--bg3);color:var(--tx2);font-size:.84rem;font-weight:500}
.pill:hover{background:var(--bg4);color:var(--tx)}
.pill.active{background:var(--acc);color:#fff}
.pool-list{display:flex;flex-direction:column;gap:12px}
.pool-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px 20px;border-left:4px solid var(--grn);transition:all .2s;cursor:pointer}
.pool-card:hover{border-color:var(--brd2);transform:translateY(-1px);box-shadow:var(--shadow)}
.pool-card.closed{border-left-color:var(--tx3)}
.pool-card.rewards{border-left-color:var(--ylw)}
.pool-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.pool-pair{font-size:1.1rem;font-weight:700;letter-spacing:-.01em}
.pool-meta{font-size:.8rem;color:var(--tx3)}
.badge{padding:3px 10px;border-radius:12px;font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-active{background:#22c55e20;color:var(--grn)}
.badge-closed{background:#6b6f8520;color:var(--tx3)}
.badge-rewards{background:#eab30820;color:var(--ylw)}
.badge-reinvertido{background:#4f8cff20;color:var(--acc)}
.badge-retirado{background:#22c55e20;color:var(--grn)}
.badge-pendiente{background:#eab30820;color:var(--ylw)}
.wtag{padding:3px 10px;border-radius:12px;font-size:.73rem;font-weight:600}
.pool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.pool-stat .ps-label{font-size:.74rem;color:var(--tx3);margin-bottom:2px}
.pool-stat .ps-val{font-size:1rem;font-weight:600}

/* DETAIL VIEW */
.detail-header{margin-bottom:24px}
.detail-pair{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.detail-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:.85rem;color:var(--tx2)}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:.9rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.token-row{display:flex;gap:16px;margin-bottom:8px;align-items:center}
.token-row .tsym{font-weight:600;min-width:60px}
.comparison{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.comp-card{padding:18px;border-radius:var(--r2);border:1px solid var(--brd)}
.comp-card h4{font-size:.82rem;color:var(--tx2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.comp-card .cv{font-size:1.3rem;font-weight:700}
.verdict{padding:16px 20px;border-radius:var(--r2);font-size:1rem;font-weight:600;text-align:center}
.verdict.pos{background:#22c55e15;color:var(--grn);border:1px solid #22c55e30}
.verdict.neg{background:#ef444415;color:var(--red);border:1px solid #ef444430}
.il-box{padding:16px 20px;border-radius:var(--r2);margin-bottom:16px}
.il-box.loss{background:#ef444410;border:1px solid #ef444425}
.il-box.gain{background:#22c55e10;border:1px solid #22c55e25}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--brd)}
.btn{padding:10px 22px;border-radius:var(--r3);font-size:.88rem;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--tx2)}
.btn-secondary:hover{background:var(--bg4);color:var(--tx)}
.btn-danger{background:#ef444420;color:var(--red)}
.btn-danger:hover{background:#ef444430}
.btn-success{background:#22c55e20;color:var(--grn)}
.btn-success:hover{background:#22c55e30}
.btn-warning{background:#eab30820;color:var(--ylw)}
.btn-warning:hover{background:#eab30830}
.hint{font-size:.78rem;color:var(--tx3);margin-top:8px;font-style:italic}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.summary-wallet{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px}
.summary-wallet h3{font-size:1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sw-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.88rem}
.sw-row .swl{color:var(--tx2)}
.ranking{margin-bottom:24px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--brd);font-size:.88rem}
.rank-pos{font-weight:700;color:var(--tx3);min-width:24px}
.rank-pair{font-weight:600}
.rank-roi{margin-left:auto;font-weight:600}
.alert-panel{background:#eab30808;border:1px solid #eab30825;border-radius:var(--r);padding:16px 20px}
.alert-item{padding:8px 0;border-bottom:1px solid var(--brd);font-size:.88rem;display:flex;justify-content:space-between}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--r);max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 24px 80px #000a;transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:1.15rem;font-weight:700;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:var(--bg3);color:var(--tx2);font-size:1rem;display:flex;align-items:center;justify-content:center}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.82rem;color:var(--tx2);margin-bottom:5px;font-weight:500}
.form-group input,.form-group select{width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.purchase-history{margin-bottom:16px}
.purchase-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:6px;font-size:.84rem}
.preview-box{background:var(--bg3);border-radius:var(--r3);padding:12px 16px;margin-bottom:16px;font-size:.88rem}
.preview-box .pv-label{color:var(--tx2);font-size:.78rem}
.preview-box .pv-val{font-weight:700;font-size:1.05rem;margin-top:2px}
.divider{height:1px;background:var(--brd);margin:16px 0}

/* RESPONSIVE */
@media(max-width:768px){
.panels{grid-template-columns:1fr}
.pool-grid{grid-template-columns:repeat(2,1fr)}
.metrics.m3,.metrics.m4{grid-template-columns:repeat(2,1fr)}
.comparison,.summary-grid{grid-template-columns:1fr}
.wallet-sel{grid-template-columns:1fr}
.form-row,.form-row3{grid-template-columns:1fr}
.nav{padding:0 10px;gap:3px;overflow-x:auto}
.nav-btn{padding:7px 12px;font-size:.82rem;white-space:nowrap}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* EXPORT/IMPORT BAR */
.bar-actions{display:flex;gap:8px;margin-left:auto}
.bar-actions .btn{padding:7px 14px;font-size:.82rem}
.tabs-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty .e-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty .e-title{font-size:1.1rem;font-weight:600;color:var(--tx2);margin-bottom:6px}
</style>
</head>
<body>
<nav class="nav" id="nav">
  <button class="nav-btn active" onclick="go('portfolio')">Portfolio</button>
  <div class="nav-sep"></div>
  <button class="nav-btn" onclick="go('pools')">Pools DeFi</button>
  <button class="nav-btn" onclick="go('summary')">Resumen</button>
  <div class="nav-right">
    <button class="btn-add" id="btnAdd" onclick="onAdd()">+ Activo</button>
    <button class="nav-icon" onclick="syncPrices(true)" title="Actualizar precios">↻</button>
    <span id="syncInfo"></span>
    <button class="nav-icon" onclick="openConfig()" title="Configuración">⚙</button>
  </div>
</nav>
<div class="main" id="app"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ===================== DB =====================
const DB_KEY='crmcrypto_v3';
function loadDB(){try{return JSON.parse(localStorage.getItem(DB_KEY))||defaultDB()}catch(e){return defaultDB()}}
function saveDB(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
function defaultDB(){return{config:{wallet1Name:'Wallet 1',wallet2Name:'Wallet 2 (compartida)'},assets:[],positions:[],lastSync:0}}
let db=loadDB();

// ===================== WALLETS =====================
let WALLETS={};
function refreshWallets(){
  WALLETS={
    wallet1:{id:'wallet1',name:db.config.wallet1Name||'Wallet 1',color:'#378ADD',type:'Personal'},
    wallet2:{id:'wallet2',name:db.config.wallet2Name||'Wallet 2 (compartida)',color:'#BA7517',type:'Compartida'}
  };
}
refreshWallets();

// ===================== STATE =====================
let state={view:'portfolio',subTab:'all',selWallet:'wallet1',poolFilter:'all',detailId:null};
const COLORS=['#4f8cff','#22c55e','#f97316','#a855f7','#ec4899','#06b6d4','#eab308','#ef4444','#8b5cf6','#14b8a6','#f43f5e','#6366f1','#84cc16','#0ea5e9'];
const CG_MAP={BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',USDC:'usd-coin',USDT:'tether',MATIC:'matic-network',AVAX:'avalanche-2',ARB:'arbitrum',OP:'optimism',WBTC:'wrapped-bitcoin',WETH:'weth',HYPE:'hyperliquid',XRP:'ripple',SUI:'sui',LINK:'chainlink',UNI:'uniswap',AAVE:'aave',CRV:'curve-dao-token',DOGE:'dogecoin',ADA:'cardano',DOT:'polkadot',ATOM:'cosmos',FTM:'fantom',NEAR:'near',APT:'aptos',SEI:'sei-network',TIA:'celestia',JUP:'jupiter-exchange-solana',WIF:'dogwifcoin',PEPE:'pepe',RENDER:'render-token',FET:'artificial-superintelligence-alliance',TAO:'bittensor',INJ:'injective-protocol',TRX:'tron',TON:'the-open-network',SHIB:'shiba-inu',LTC:'litecoin',BCH:'bitcoin-cash',STX:'blockstack',MKR:'maker',PENDLE:'pendle',ENA:'ethena',W:'wormhole',STRK:'starknet',EIGEN:'eigenlayer',CBBTC:'coinbase-wrapped-btc',CBETH:'coinbase-wrapped-staked-eth',AERO:'aerodrome-finance',VIRTUAL:'virtual-protocol',AI16Z:'ai16z',BERA:'berachain',KAITO:'kaito',CAKE:'pancakeswap-token',XLM:'stellar',ALGO:'algorand'};

// ===================== UTILS =====================
const $=s=>document.querySelector(s);
const fmt=n=>{if(n==null||isNaN(n))return'$0.00';let a=Math.abs(n);if(a>=1e6)return(n<0?'-':'')+'$'+(a/1e6).toFixed(2)+'M';if(a>=1e3)return(n<0?'-':'')+'$'+a.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});return(n<0?'-':'')+'$'+a.toFixed(2)};
const fmtP=n=>{if(n==null||isNaN(n))return'0.00';return n.toFixed(2)};
const fmtPct=n=>(n>=0?'+':'')+fmtP(n)+'%';
const fmtQty=n=>{if(n==null)return'0';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return n.toLocaleString('en',{maximumFractionDigits:4});if(n>=1)return n.toFixed(4);return n.toFixed(6)};
const fmtPrice=n=>{if(n>=100)return'$'+n.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return'$'+n.toFixed(4);return'$'+n.toFixed(6)};
const pnlClass=n=>n>=0?'pnl-pos':'pnl-neg';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const daysBetween=(a,b)=>Math.max(1,Math.round((new Date(b)-new Date(a))/864e5));
const today=()=>new Date().toISOString().slice(0,10);

// Migrate purchases
function migrate(){
  db.assets.forEach(a=>{
    if(!a.purchases){
      a.purchases=[{id:uid(),qty:a.qty||0,price:a.buyPrice||0,date:a.dateAdded||today()}];
    }
    recalcAsset(a);
  });
  saveDB(db);
}
function recalcAsset(a){
  if(!a.purchases||!a.purchases.length){a.qty=0;a.buyPrice=0;return}
  let tq=0,tv=0;
  a.purchases.forEach(p=>{tq+=+p.qty;tv+=p.qty*p.price});
  a.qty=tq;a.buyPrice=tq>0?tv/tq:0;
}
migrate();

// ===================== COINGECKO =====================
async function syncPrices(force){
  const now=Date.now();
  if(!force&&db.lastSync&&now-db.lastSync<600000)return;
  const ids=new Set();
  db.assets.forEach(a=>{const cg=CG_MAP[a.symbol.toUpperCase()];if(cg)ids.add(cg)});
  if(!ids.size)return;
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+[...ids].join(',')+'&vs_currencies=usd');
    const d=await r.json();
    db.assets.forEach(a=>{
      const cg=CG_MAP[a.symbol.toUpperCase()];
      if(cg&&d[cg]&&d[cg].usd)a.price=d[cg].usd;
    });
    db.lastSync=Date.now();saveDB(db);render();
  }catch(e){console.warn('Sync failed',e)}
  updateSyncInfo();
}

// ===================== PORTFOLIO =====================
function getWalletAssets(wid){return db.assets.filter(a=>a.wallet===wid)}
function assetVal(a){return(a.qty||0)*(a.price||0)}
function assetPnl(a){return a.qty*(a.price-a.buyPrice)}
function walletHodl(wid){return getWalletAssets(wid).reduce((s,a)=>s+assetVal(a),0)}
function walletDefi(wid){return db.positions.filter(p=>p.wallet===wid&&p.status==='active').reduce((s,p)=>s+(+p.curVal||0),0)}
function walletRewards(wid){return db.positions.filter(p=>p.wallet===wid).reduce((s,p)=>s+rewTotal(p),0)}
function poolCap(p){return(p.taQty*p.taPrice)+(p.tbQty*p.tbPrice)}
function rewTotal(p){return(p.rewards||[]).reduce((s,r)=>s+(+r.usd||0),0)}
function poolPnl(p){
  if(p.status==='closed'){return((p.exitTaQty*p.exitTaPrice)+(p.exitTbQty*p.exitTbPrice))+(+p.exitFees||0)+rewTotal(p)-poolCap(p)}
  return(+p.curVal||0)+rewTotal(p)-poolCap(p);
}
function poolRoi(p){const c=poolCap(p);return c?poolPnl(p)/c*100:0}
function poolDays(p){return daysBetween(p.dateIn,p.dateOut||today())}
function poolApy(p){const d=poolDays(p),r=poolRoi(p)/100;if(d<1)return 0;return((Math.pow(1+r,365/d))-1)*100}
function poolExitVal(p){return(p.exitTaQty||0)*(p.exitTaPrice||0)+(p.exitTbQty||0)*(p.exitTbPrice||0)}

function renderAssetTable(assets,showOrigin){
  if(!assets.length)return`<div class="empty"><div class="e-icon">📂</div><div class="e-title">Sin activos</div><div>Pulsa "+ Activo" para empezar</div></div>`;

function drawAllCharts(){
  const ids=state.subTab==='all'?['chart_all']:['chart_my'];
  ids.forEach(id=>{
    const c=document.getElementById(id);if(!c)return;
    const ctx=c.getContext('2d');
    const assets=state.subTab==='all'?getWalletAssets(state.selWallet):getConsolidatedAssets();
    const total=assets.reduce((s,a)=>s+a.qty*a.price,0);
    drawDonut(ctx,assets.map((a,i)=>({val:a.qty*a.price,color:COLORS[i%COLORS.length]})),total,200);
  });
}
function getConsolidatedAssets(){
  const map={};
  db.assets.forEach(a=>{const m=a.wallet==='wallet1'?1:0.5;const k=a.symbol;if(!map[k])map[k]={symbol:a.symbol,name:a.name,price:a.price,qty:0,totalCost:0};map[k].qty+=a.qty*m;map[k].totalCost+=(a.qty*a.buyPrice)*m});
  return Object.values(map).map(a=>{a.buyPrice=a.qty>0?a.totalCost/a.qty:0;return a});
}
function drawDonut(ctx,data,total,size){
  ctx.clearRect(0,0,size*2,size*2);
  if(!data.length||!total)return;
  const cx=size,cy=size,r=size*0.78,w=size*0.22;
  let startAngle=-Math.PI/2;
  data.forEach(d=>{
    const sweep=(d.val/total)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,startAngle,startAngle+sweep);
    ctx.arc(cx,cy,r-w,startAngle+sweep,startAngle,true);
    ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    startAngle+=sweep;
  });
}

  const isClosed=p.status==='closed';
  const hasPending=(p.rewards||[]).some(r=>r.state==='pendiente');
  const badge=isClosed?'<span class="badge badge-closed">Cerrada</span>':hasPending?'<span class="badge badge-rewards">Rewards pendientes</span>':'<span class="badge badge-active">Activa</span>';

    h+=`<button class="btn btn-secondary" onclick="openEditPool('${p.id}')">✎ Editar datos</button>`;
  }
  h+=`<button class="btn btn-danger" onclick="confirmDeletePool('${p.id}')">Eliminar</button></div>`;
  if(!isClosed)h+=`<div class="hint">Cerrar posición guarda en historial · Eliminar borra sin rastro</div>`;
  h+=`</div>`;
  app.innerHTML=h;
}

// ===================== SUMMARY =====================
function renderSummary(app){
  const totalHodl=walletHodl('wallet1')+walletHodl('wallet2');
  const totalDefi=walletDefi('wallet1')+walletDefi('wallet2');
  const total=totalHodl+totalDefi;
  const plusvalia=db.assets.reduce((s,a)=>s+assetPnl(a),0);
  const totalRew=db.positions.reduce((s,p)=>s+rewTotal(p),0);
  let h=`<div class="fade-in"><div class="metrics m3">`;
  h+=`<div class="metric hero"><div class="label">Portfolio total</div><div class="val">${fmt(total)}</div><div class="sub">HODL ${fmt(totalHodl)} + DeFi ${fmt(totalDefi)}</div></div>`;
  h+=`<div class="metric"><div class="label">Plusvalía</div><div class="val ${pnlClass(plusvalia)}">${fmt(plusvalia)}</div><div class="sub">Revalorización vs precio medio</div></div>`;
  h+=`<div class="metric"><div class="label">Rewards totales</div><div class="val pnl-pos">${fmt(totalRew)}</div><div class="sub">Todas las pools</div></div></div>`;
  h+=`<div class="summary-grid">`;
  ['wallet1','wallet2'].forEach(wid=>{
    const w=WALLETS[wid];const h1=walletHodl(wid);const d1=walletDefi(wid);const rew=walletRewards(wid);
    const activeP=db.positions.filter(p=>p.wallet===wid&&p.status==='active').length;
    const roiW=(h1+d1)>0?((db.assets.filter(a=>a.wallet===wid).reduce((s,a)=>s+assetPnl(a),0))/(h1||1)*100):0;
    h+=`<div class="summary-wallet"><h3><div style="width:12px;height:12px;border-radius:4px;background:${w.color}"></div>${w.name}<span style="font-size:.78rem;color:var(--tx3);font-weight:400;margin-left:4px">${w.type}</span></h3>`;
    h+=`<div class="sw-row"><span class="swl">HODL</span><span>${fmt(h1)}</span></div>`;
    h+=`<div class="sw-row"><span class="swl">DeFi</span><span>${fmt(d1)}</span></div>`;
    h+=`<div class="sw-row"><span class="swl">Rewards</span><span>${fmt(rew)}</span></div>`;
    h+=`<div class="sw-row"><span class="swl">ROI HODL</span><span class="${pnlClass(roiW)}">${fmtPct(roiW)}</span></div>`;
    h+=`<div class="sw-row"><span class="swl">Posiciones activas</span><span>${activeP}</span></div></div>`;
  });
  h+=`</div>`;
  // Ranking by ROI
  const sorted=[...db.positions].sort((a,b)=>poolRoi(b)-poolRoi(a));
  if(sorted.length){
    h+=`<div class="card ranking" style="margin-bottom:24px"><div class="card-header">Ranking por ROI</div>`;
    sorted.forEach((p,i)=>{
      const roi=poolRoi(p);
      h+=`<div class="rank-item" onclick="go('detail',{detailId:'${p.id}'})" style="cursor:pointer"><span class="rank-pos">${i+1}</span><div class="legend-dot" style="background:${WALLETS[p.wallet]?.color||'#666'};width:10px;height:10px;border-radius:50%"></div><span class="rank-pair">${p.taSymbol}/${p.tbSymbol}</span>`;
      if(p.status==='closed')h+=`<span class="badge badge-closed" style="margin-left:8px">Cerrada</span>`;
      h+=`<span class="rank-roi ${pnlClass(roi)}">${fmtPct(roi)}</span></div>`;
    });
    h+=`</div>`;
  }
  // Alerts
  const pending=db.positions.filter(p=>p.status==='active'&&(p.rewards||[]).some(r=>r.state==='pendiente'));
  if(pending.length){
    h+=`<div class="alert-panel"><div class="card-header">⚠ Alerts — Rewards pendientes</div>`;
    pending.forEach(p=>{
      const pRew=(p.rewards||[]).filter(r=>r.state==='pendiente').reduce((s,r)=>s+(+r.usd||0),0);
      h+=`<div class="alert-item" onclick="go('detail',{detailId:'${p.id}'})" style="cursor:pointer"><span>${p.taSymbol}/${p.tbSymbol} — ${WALLETS[p.wallet]?.name||p.wallet}</span><span class="pnl-pos">${fmt(pRew)} pendiente</span></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  app.innerHTML=h;
}

// Purchase modal
function openPurchaseModal(assetId){
  const a=db.assets.find(x=>x.id===assetId);if(!a)return;
  let h=`<h2>Compras — ${a.symbol}</h2>`;
  h+=`<div class="purchase-history">`;
  (a.purchases||[]).forEach(p=>{
    h+=`<div class="purchase-item"><span>${p.date||'—'} · ${fmtQty(p.qty)} × ${fmtPrice(p.price)} = ${fmt(p.qty*p.price)}</span><button class="act-btn del" onclick="deletePurchase('${a.id}','${p.id}')">✕</button></div>`;
  });
  h+=`</div>`;
  h+=`<div class="preview-box"><div class="pv-label">Precio medio actual</div><div class="pv-val">${fmtPrice(a.buyPrice)}</div></div>`;
  h+=`<div class="divider"></div><h3 style="margin-bottom:12px;font-size:.95rem">Nueva compra</h3>`;
  h+=`<div class="form-row3"><div class="form-group"><label>Cantidad</label><input id="pQty" type="number" step="any" oninput="previewPM('${a.id}')"></div><div class="form-group"><label>Precio</label><input id="pPrice" type="number" step="any" oninput="previewPM('${a.id}')"></div><div class="form-group"><label>Fecha</label><input id="pDate" type="date" value="${today()}"></div></div>`;
  h+=`<div class="preview-box" id="pmPreview" style="display:none"><div class="pv-label">Nuevo precio medio</div><div class="pv-val" id="pmPreviewVal"></div></div>`;
  h+=`<button class="btn btn-primary" onclick="savePurchase('${a.id}')" style="width:100%;margin-top:8px">Añadir compra</button>`;
  openModal(h);
}
function previewPM(aid){
  const a=db.assets.find(x=>x.id===aid);if(!a)return;
  const q=+$('#pQty').value,p=+$('#pPrice').value;
  if(q>0&&p>0){
    const tq=a.purchases.reduce((s,x)=>s+x.qty,0)+q;
    const tv=a.purchases.reduce((s,x)=>s+x.qty*x.price,0)+q*p;
    $('#pmPreview').style.display='';$('#pmPreviewVal').textContent=fmtPrice(tv/tq);
  }else{$('#pmPreview').style.display='none'}
}
function savePurchase(aid){
  const a=db.assets.find(x=>x.id===aid);if(!a)return;
  a.purchases.push({id:uid(),qty:+$('#pQty').value||0,price:+$('#pPrice').value||0,date:$('#pDate').value||today()});
  recalcAsset(a);saveDB(db);closeModal();render();
}
function deletePurchase(aid,pid){
  const a=db.assets.find(x=>x.id===aid);if(!a)return;
  a.purchases=a.purchases.filter(p=>p.id!==pid);
  recalcAsset(a);saveDB(db);openPurchaseModal(aid);
}

// ===================== POOL MODALS =====================
function openPoolModal(pid){
  const p=pid?db.positions.find(x=>x.id===pid):null;
  const title=p?'Editar posición':'Nueva posición';
  openModal(`<h2>${title}</h2>
    <div class="form-group"><label>Wallet</label><select id="ppWallet"><option value="wallet1" ${p?.wallet==='wallet1'?'selected':''}>${WALLETS.wallet1.name}</option><option value="wallet2" ${p?.wallet==='wallet2'?'selected':''}>${WALLETS.wallet2.name}</option></select></div>
    <div class="form-row"><div class="form-group"><label>Protocolo</label><input id="ppProto" value="${p?.protocol||''}" placeholder="PancakeSwap"></div><div class="form-group"><label>Red</label><input id="ppNet" value="${p?.network||''}" placeholder="Base"></div></div>
    <div class="divider"></div><h3 style="margin-bottom:12px;font-size:.95rem">Token A</h3>
    <div class="form-row3"><div class="form-group"><label>Símbolo</label><input id="ppTaS" value="${p?.taSymbol||''}" placeholder="ETH"></div><div class="form-group"><label>Cantidad</label><input id="ppTaQ" type="number" step="any" value="${p?.taQty||''}"></div><div class="form-group"><label>Precio entrada</label><input id="ppTaP" type="number" step="any" value="${p?.taPrice||''}"></div></div>
    <h3 style="margin-bottom:12px;font-size:.95rem">Token B</h3>
    <div class="form-row3"><div class="form-group"><label>Símbolo</label><input id="ppTbS" value="${p?.tbSymbol||''}" placeholder="USDC"></div><div class="form-group"><label>Cantidad</label><input id="ppTbQ" type="number" step="any" value="${p?.tbQty||''}"></div><div class="form-group"><label>Precio entrada</label><input id="ppTbP" type="number" step="any" value="${p?.tbPrice||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>Fecha entrada</label><input id="ppDateIn" type="date" value="${p?.dateIn||today()}"></div><div class="form-group"><label>Valor actual (USD)</label><input id="ppCurVal" type="number" step="any" value="${p?.curVal||''}"></div></div>
    ${p?.status==='closed'?`
    <div class="divider"></div><h3 style="margin-bottom:12px;font-size:.95rem">Datos de cierre</h3>
    <div class="form-row3"><div class="form-group"><label>${p.taSymbol} salida qty</label><input id="ppExTaQ" type="number" step="any" value="${p.exitTaQty||''}"></div><div class="form-group"><label>${p.taSymbol} precio salida</label><input id="ppExTaP" type="number" step="any" value="${p.exitTaPrice||''}"></div><div class="form-group"><label>Fecha salida</label><input id="ppDateOut" type="date" value="${p.dateOut||''}"></div></div>
    <div class="form-row3"><div class="form-group"><label>${p.tbSymbol} salida qty</label><input id="ppExTbQ" type="number" step="any" value="${p.exitTbQty||''}"></div><div class="form-group"><label>${p.tbSymbol} precio salida</label><input id="ppExTbP" type="number" step="any" value="${p.exitTbPrice||''}"></div><div class="form-group"><label>Fees salida (USD)</label><input id="ppExFees" type="number" step="any" value="${p.exitFees||''}"></div></div>`:''}
    <button class="btn btn-primary" onclick="savePool('${p?.id||''}')" style="width:100%;margin-top:12px">Guardar</button>`);
}
function openEditPool(pid){openPoolModal(pid)}
function savePool(pid){
  const isEdit=!!pid;
  const p=isEdit?db.positions.find(x=>x.id===pid):{id:uid(),status:'active',rewards:[]};
  p.wallet=$('#ppWallet').value;p.protocol=$('#ppProto').value;p.network=$('#ppNet').value;
  p.taSymbol=($('#ppTaS').value||'').toUpperCase();p.taQty=+$('#ppTaQ').value||0;p.taPrice=+$('#ppTaP').value||0;
  p.tbSymbol=($('#ppTbS').value||'').toUpperCase();p.tbQty=+$('#ppTbQ').value||0;p.tbPrice=+$('#ppTbP').value||0;
  p.dateIn=$('#ppDateIn').value||today();p.curVal=+$('#ppCurVal').value||0;
  if(p.status==='closed'){
    const el=id=>document.getElementById(id);
    if(el('ppExTaQ')){p.exitTaQty=+el('ppExTaQ').value||0;p.exitTaPrice=+el('ppExTaP').value||0;p.exitTbQty=+el('ppExTbQ').value||0;p.exitTbPrice=+el('ppExTbP').value||0;p.exitFees=+el('ppExFees').value||0;p.dateOut=el('ppDateOut').value||today()}
  }
  if(!isEdit)db.positions.push(p);
  saveDB(db);closeModal();
  if(state.view==='detail')render();else go(state.view);
}

// Close position
function closePosition(pid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  openModal(`<h2>Cerrar posición — ${p.taSymbol}/${p.tbSymbol}</h2>
    <div class="form-row3"><div class="form-group"><label>${p.taSymbol} salida qty</label><input id="cpExTaQ" type="number" step="any"></div><div class="form-group"><label>${p.taSymbol} precio salida</label><input id="cpExTaP" type="number" step="any"></div><div class="form-group"><label>Fecha salida</label><input id="cpDateOut" type="date" value="${today()}"></div></div>
    <div class="form-row3"><div class="form-group"><label>${p.tbSymbol} salida qty</label><input id="cpExTbQ" type="number" step="any"></div><div class="form-group"><label>${p.tbSymbol} precio salida</label><input id="cpExTbP" type="number" step="any"></div><div class="form-group"><label>Fees salida (USD)</label><input id="cpExFees" type="number" step="any" value="0"></div></div>
    <div class="hint" style="margin-bottom:12px">Los tokens se devolverán al HODL de la misma wallet.</div>
    <button class="btn btn-warning" onclick="confirmClose('${p.id}')" style="width:100%">Confirmar cierre</button>`);
}
function confirmClose(pid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  p.status='closed';
  p.exitTaQty=+$('#cpExTaQ').value||0;p.exitTaPrice=+$('#cpExTaP').value||0;
  p.exitTbQty=+$('#cpExTbQ').value||0;p.exitTbPrice=+$('#cpExTbP').value||0;
  p.exitFees=+$('#cpExFees').value||0;p.dateOut=$('#cpDateOut').value||today();
  // Return tokens to HODL
  [['taSymbol','exitTaQty','exitTaPrice'],['tbSymbol','exitTbQty','exitTbPrice']].forEach(([sKey,qKey,pKey])=>{
    const sym=p[sKey];const qty=p[qKey];const price=p[pKey];
    if(!sym||!qty)return;
    let existing=db.assets.find(a=>a.wallet===p.wallet&&a.symbol===sym);
    if(existing){existing.purchases.push({id:uid(),qty,price,date:p.dateOut});recalcAsset(existing);existing.price=price}
    else{const a={id:uid(),wallet:p.wallet,symbol:sym,name:sym,price,purchases:[{id:uid(),qty,price,date:p.dateOut}],qty:0,buyPrice:0};recalcAsset(a);db.assets.push(a)}
  });
  saveDB(db);closeModal();render();
}
function confirmDeletePool(pid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  openModal(`<h2 style="color:var(--red)">⚠ Eliminar posición</h2>
    <p style="margin-bottom:16px;color:var(--tx2)">¿Eliminar <strong>${p.taSymbol}/${p.tbSymbol}</strong> permanentemente? Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:8px"><button class="btn btn-danger" onclick="doDeletePool('${pid}')" style="flex:1">Sí, eliminar</button><button class="btn btn-secondary" onclick="closeModal()" style="flex:1">Cancelar</button></div>`);
}
function doDeletePool(pid){
  db.positions=db.positions.filter(p=>p.id!==pid);saveDB(db);closeModal();go('pools');
}

// Rewards
function openRewardModal(pid,rid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  const r=rid?(p.rewards||[]).find(x=>x.id===rid):null;
  openModal(`<h2>${r?'Editar':'Nuevo'} Reward — ${p.taSymbol}/${p.tbSymbol}</h2>
    <div class="form-row"><div class="form-group"><label>Importe (USD)</label><input id="rwUsd" type="number" step="any" value="${r?.usd||''}"></div><div class="form-group"><label>Fecha</label><input id="rwDate" type="date" value="${r?.date||today()}"></div></div>
    <div class="form-group"><label>Estado</label><select id="rwState"><option value="pendiente" ${r?.state==='pendiente'?'selected':''}>Pendiente</option><option value="reinvertido" ${r?.state==='reinvertido'?'selected':''}>Reinvertido</option><option value="retirado" ${r?.state==='retirado'?'selected':''}>Retirado</option></select></div>
    <button class="btn btn-primary" onclick="saveReward('${pid}','${rid||''}')" style="width:100%;margin-top:8px">Guardar</button>`);
}
function editReward(pid,rid){openRewardModal(pid,rid)}
function saveReward(pid,rid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  if(!p.rewards)p.rewards=[];
  if(rid){const r=p.rewards.find(x=>x.id===rid);if(r){r.usd=+$('#rwUsd').value||0;r.date=$('#rwDate').value;r.state=$('#rwState').value}}
  else{p.rewards.push({id:uid(),usd:+$('#rwUsd').value||0,date:$('#rwDate').value||today(),state:$('#rwState').value||'pendiente'})}
  saveDB(db);closeModal();render();
}
function deleteReward(pid,rid){
  const p=db.positions.find(x=>x.id===pid);if(!p)return;
  p.rewards=(p.rewards||[]).filter(r=>r.id!==rid);saveDB(db);render();
}

// ===================== EXPORT/IMPORT =====================
function exportDB(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`crmcrypto_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.assets&&!d.positions){alert('JSON inválido: no contiene assets ni positions');return}
      if(!confirm('¿Importar? Se sobreescribirán todos los datos actuales.'))return;
      db=Object.assign(defaultDB(),d);saveDB(db);refreshWallets();migrate();render();
    }catch(err){alert('Error al parsear JSON: '+err.message)}
  };
  reader.readAsText(f);e.target.value='';
}

// ===================== INIT =====================
render();
syncPrices(false);
</script>
